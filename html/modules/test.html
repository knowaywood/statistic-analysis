<div class="module-content" id="test">
  <div class="page-header">
    <div class="header-left">
      <h1>Pyodide 测试</h1>
      <div class="breadcrumb"><i class="fas fa-folder-open"></i> 测试 / Pyodide / WebAssembly</div>
    </div>
  </div>

  <div class="param-card">
    <div class="param-title"><i class="fas fa-flask" style="color:#2a5c8a;"></i> 浏览器端 Python 测试</div>
    <p style="color:#55738b; margin-bottom:16px; font-size:14px;">
      点击下方按钮运行 Python 代码（通过 Pyodide 将 CPython 编译为 WebAssembly），
      所有计算在浏览器本地完成，无需后端服务器。
    </p>
    <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
      <button class="btn-primary btn-run" data-module="test" data-func="hello" disabled>
        <i class="fas fa-play"></i> Hello World
      </button>
      <button class="btn-primary btn-run" data-module="test" data-func="math_demo" disabled>
        <i class="fas fa-calculator"></i> 数学计算
      </button>
      <button class="btn-primary btn-run" data-module="test" data-func="plot_sin" disabled>
        <i class="fas fa-chart-line"></i> 绘制 sin(x)
      </button>
      <span id="pyStatus" style="font-size:13px; color:#8a9aaa;">
        <i class="fas fa-spinner fa-pulse"></i> 加载 Pyodide 中...
      </span>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-header">
      <h3><i class="fas fa-terminal" style="margin-right:8px; color:#1e4b6e;"></i>Python 输出</h3>
    </div>
    <pre class="py-output">点击按钮运行 Python 代码...</pre>
  </div>

  <div class="chart-card">
    <div class="chart-header">
      <h3><i class="fas fa-image" style="margin-right:8px; color:#1e4b6e;"></i>matplotlib 绘图</h3>
    </div>
    <div class="chart-container"></div>
  </div>

  <div class="metrics-row">
    <div class="metric-item">
      <div class="metric-label"><i class="fas fa-calculator"></i> 结果 1</div>
      <div class="metric-value">--</div>
    </div>
    <div class="metric-item">
      <div class="metric-label"><i class="fas fa-calculator"></i> 结果 2</div>
      <div class="metric-value">--</div>
    </div>
    <div class="metric-item">
      <div class="metric-label"><i class="fas fa-calculator"></i> 结果 3</div>
      <div class="metric-value">--</div>
    </div>
    <div class="metric-item">
      <div class="metric-label"><i class="fas fa-calculator"></i> 结果 4</div>
      <div class="metric-value">--</div>
    </div>
  </div>
</div>
