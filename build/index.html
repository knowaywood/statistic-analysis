        <button class="nav-item" data-module="statistics"><i class="fas fa-chart-bar"></i> 统计评价</button>

        <button class="nav-item" data-module="extended"><i class="fas fa-plus-minus"></i> 扩展线性</button>

def plot_sin():
    x = np.linspace(0, 2, 100)
    y = np.sin(x)

    fig, ax = plt.subplots(figsize=(6, 3))
    ax.plot(x, y, color='#2a5c8a', linewidth=2)
    ax.set_title("y = sin(x), x in [0, 2]")
    ax.set_xlabel("x")
    ax.set_ylabel("sin(x)")
    ax.grid(True, alpha=0.3)
    fig.tight_layout()

    buf = io.BytesIO()
    fig.savefig(buf, format='svg')
    plt.close(fig)
    svg = buf.getvalue().decode()
